name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build, test, and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: ./mvnw -B package

      - name: Smoke test shaded jar
        run: |
          JAR="$(find target -maxdepth 1 -type f -name 'konductor-*.jar' ! -name 'original-*' -print -quit)"
          test -n "$JAR"
          java -jar "$JAR" --help
