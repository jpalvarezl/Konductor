name: Release

# Cut a release by updating CHANGELOG.md, then pushing a tag:
#   git tag v0.1.1 && git push origin v0.1.1
#
# jpackage cannot cross-compile, so each OS builds its own artifact. The release is created once, after every
# package succeeds, to avoid publishing a temporary bare or partial release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for a manual artifact-only build, e.g. 0.1.1'
        required: false
        default: '0.1.1'

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Derive versions
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          # macOS jpackage rejects a leading-zero app version. Keep the release/artifact version unchanged, but map
          # pre-1.0 tags to a valid internal bundle version (0.1.1 -> 1.1.1).
          mac_version="$version"
          if [[ "$version" == 0.* ]]; then
            mac_version="1${version#0}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "mac_version=$mac_version" >> "$GITHUB_OUTPUT"

      - name: Install .deb tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: mvn -B -Pdist package -Djpackage.type=deb "-Djpackage.win.console=" "-Djpackage.app.version=${{ steps.ver.outputs.version }}"

      - name: Build .dmg (macOS, unsigned)
        if: runner.os == 'macOS'
        run: mvn -B -Pdist package -Djpackage.type=dmg "-Djpackage.win.console=" "-Djpackage.app.version=${{ steps.ver.outputs.mac_version }}"

      - name: Build app-image (Windows)
        if: runner.os == 'Windows'
        run: mvn -B -Pdist package "-Djpackage.type=app-image" "-Djpackage.app.version=${{ steps.ver.outputs.version }}"

      - name: Zip app-image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/dist/Konductor -DestinationPath "konductor-${{ steps.ver.outputs.version }}-windows-x64.zip"

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist-out
          case "${{ runner.os }}" in
            Linux)   cp target/dist/*.deb dist-out/ ;;
            macOS)   cp target/dist/*.dmg dist-out/ ;;
            Windows) cp konductor-*-windows-x64.zip dist-out/ ;;
          esac
          ls -la dist-out

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: konductor-${{ runner.os }}
          path: dist-out/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        shell: bash
        run: |
          version="${{ steps.ver.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]( |$)" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: konductor-*
          path: dist-out
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Konductor v${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          files: dist-out/*
          fail_on_unmatched_files: true
